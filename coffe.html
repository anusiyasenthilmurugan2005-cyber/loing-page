<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Shop</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #3e2723, #6d4c41);
      color: #fff;
      overflow-x: hidden;
    }
    header {
      text-align: center;
      padding: 50px;
      animation: fadeInDown 2s ease;
    }
    header h1 {
      font-size: 3em;
      margin: 0;
      animation: glow 2s infinite alternate;
    }
    @keyframes fadeInDown {
      from {opacity: 0; transform: translateY(-50px);}
      to {opacity: 1; transform: translateY(0);}
    }
    @keyframes glow {
      from {text-shadow: 0 0 10px #ffcc80;}
      to {text-shadow: 0 0 20px #ffe0b2;}
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    nav a {
      color: #ffe0b2;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.3s;
    }
    nav a:hover {
      transform: scale(1.2);
      color: #fff;
    }
    section {
      padding: 40px;
      text-align: center;
      animation: fadeIn 2s ease;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    .coffee-cup {
      width: 100px;
      height: 150px;
      margin: 20px auto;
      background: #4e342e;
      border-radius: 0 0 50px 50px;
      position: relative;
      animation: steam 3s infinite;
    }
    .coffee-cup::before {
      content: '';
      position: absolute;
      top: -20px;
      left: 30px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: rise 3s infinite;
    }
    @keyframes steam {
      0% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
      100% {transform: translateY(0);}
    }
    @keyframes rise {
      0% {opacity: 0; transform: translateY(0);}
      50% {opacity: 1; transform: translateY(-20px);}
      100% {opacity: 0; transform: translateY(-40px);}
    }
    .form-container {
      max-width: 400px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      animation: fadeInUp 2s ease;
    }
    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(50px);}
      to {opacity: 1; transform: translateY(0);}
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    input, textarea {
      background: #fff;
      color: #000;
    }
    button {
      background: #ffcc80;
      color: #3e2723;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #ffe0b2;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <header>
    <h1>☕ Welcome to Aroma Coffee</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#login">Login</a>
      <a href="#feedback">Feedback</a>
    </nav>
  </header>

  <section id="home">
    <h2>Freshly Brewed Happiness</h2>
    <div class="coffee-cup"></div>
    <p>Enjoy the finest blends and cozy atmosphere at Aroma Coffee.</p>
  </section>

  <section id="login">
    <h2>Login</h2>
    <div class="form-container">
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </section>

  <section id="feedback">
    <h2>Feedback</h2>
    <div class="form-container">
      <form id="feedbackForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <textarea id="message" placeholder="Your Feedback" rows="4" required></textarea>
        <button type="submit">Submit Feedback</button>
      </form>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Aroma Coffee. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Login successful for user: ' + document.getElementById('username').value);
    });

    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thank you for your feedback, ' + document.getElementById('name').value + '!');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.login-box{
    width:350px;
    padding:40px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.login-box h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

.input-box input:focus{
    border-color:#2575fc;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#2575fc;
}

button{
    width:100%;
    padding:12px;
    background:#2575fc;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1a5ed8;
}

.signup{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.signup a{
    color:#2575fc;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign Up</a>
        </div>
    </form>
</div>

</body>
</html>
